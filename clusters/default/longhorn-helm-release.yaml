apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  suspend: true
  interval: 5m
  targetNamespace: longhorn-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: cilium
      namespace: flux-system
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 5m
  values:
    defaultSettings:
      defaultDataPath: /var/mnt/longhorn
      disableIscsiLikeCheck: true
