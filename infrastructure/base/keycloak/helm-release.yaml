apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: keycloak
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: cilium
      namespace: flux-system
  chart:
    spec:
      chart: keycloak
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 5m
  values:
    auth:
      adminUser: admin
      adminPassword: admin

    proxy: edge

    production: false

    postgresql:
      enabled: true
      auth:
        postgresPassword: keycloak
        password: keycloak

    replicaCount: 1

    service:
      type: LoadBalancer
      annotations:
        cilium.io/lb-ipam-ips: 192.168.121.176

    realmImport:
      enabled: true
      configmap: keycloak-realm-kite

    extraEnvVars:
      - name: KC_HOSTNAME
        value: keycloak.local
      - name: KC_HOSTNAME_STRICT
        value: "false"
      - name: KC_HTTP_ENABLED
        value: "true"
